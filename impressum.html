<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Impressum — sternenklar</title>
<style>
  @font-face {
    font-family: 'Fraunces';
    font-style: normal;
    font-weight: 400 600;
    font-display: swap;
    src: url('fonts/fraunces-normal-latin.woff2') format('woff2');
  }
  @font-face {
    font-family: 'Fraunces';
    font-style: italic;
    font-weight: 500;
    font-display: swap;
    src: url('fonts/fraunces-italic-500-latin.woff2') format('woff2');
  }
  @font-face {
    font-family: 'Inter';
    font-style: normal;
    font-weight: 400 600;
    font-display: swap;
    src: url('fonts/inter-latin.woff2') format('woff2');
  }
  :root{
    --bg-deep:#080a1c;
    --star:#f3efe2;
    --text:#ece8da;
    --text-soft:#b6b8cf;
    --gold:#e6c069;
    --gold-soft:#f0d79b;
    --line:rgba(230,192,105,0.22);
    --display:"Fraunces", Georgia, serif;
    --body:"Inter", system-ui, sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:var(--body);
    color:var(--text);
    background:var(--bg-deep);
    line-height:1.7;
  }
  .wrap{
    max-width:680px;
    margin:0 auto;
    padding:64px 24px 96px;
  }
  .back{
    display:inline-block;
    margin-bottom:48px;
    color:var(--text-soft);
    font-size:0.88rem;
    text-decoration:none;
    letter-spacing:0.01em;
  }
  .back:hover{color:var(--gold-soft);}
  .back::before{content:"← ";}
  h1{
    font-family:var(--display);
    font-weight:400;
    font-size:clamp(1.8rem,5vw,2.4rem);
    color:var(--star);
    margin-bottom:40px;
    line-height:1.2;
  }
  h2{
    font-family:var(--body);
    font-weight:600;
    font-size:0.8rem;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--gold);
    margin:40px 0 12px;
  }
  p{
    color:var(--text-soft);
    margin-bottom:12px;
  }
  a{color:var(--gold-soft);text-decoration:none;}
  a:hover{text-decoration:underline;}
  hr{border:none;border-top:1px solid var(--line);margin:40px 0;}
</style>
</head>
<body>
<div class="wrap">
  <a href="/" class="back">Zurück zur Startseite</a>
  <h1>Impressum</h1>

  <p>Sascha Krüger<br>
  Hageböcker Str. 11<br>
  18273 Güstrow</p>

  <h2>Kontakt</h2>
  <p>Telefon: 015224346907<br>
  E-Mail: <a href="mailto:info@sternenklar.org">info@sternenklar.org</a></p>

  <hr>

  <h2>Verbraucherstreitbeilegung</h2>
  <p>Wir sind nicht bereit oder verpflichtet, an Streitbeilegungsverfahren vor einer Verbraucherschlichtungsstelle teilzunehmen.</p>
</div>
</body>
</html>
